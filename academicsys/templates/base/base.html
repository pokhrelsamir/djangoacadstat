<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic System</title>

    {% load static %}

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <!-- 🔷 Navbar -->
    <nav class="navbar">
        <h2 class="logo">🎓 AcadSys</h2>
        <div class="nav-links">
            <a href="/">Home</a>
            {% if user.is_authenticated %}
                <a href="/dashboard/">Dashboard</a>
                <a href="/logout/">Logout</a>
            {% else %}
                <a href="/login/">Login</a>
            {% endif %}
        </div>
    </nav>

    <!-- 🔷 Page Content will come here -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- JS -->
    <script src="{% static 'js/script.js' %}"></script>

</body>
</html>
