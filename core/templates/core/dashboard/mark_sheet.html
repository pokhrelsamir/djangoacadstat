<body class="app-page marksheet-page">



    {% with nav_links='<a href="/dashboard/"><i class="fas fa-th-large"></i> Dashboard</a><a href="/marks-list/"><i class="fas fa-list"></i> Marks</a><a href="/select-mark-sheet/"><i class="fas fa-file-alt"></i> Mark Sheet</a>' %}



    {% include 'core/partials/app_navbar.html' %}



    {% endwith %}







    <main class="app-shell app-shell--narrow">



        <div class="marksheet-toolbar no-print">



            <a href="/select-mark-sheet/" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>



            <div class="toolbar-group">



                {% if selected_student %}



                <div class="form-group ds" style="margin:0;">



                    <label for="terminalSelect" style="margin-bottom:0.25rem;">Terminal</label>



                    <select id="terminalSelect" class="ds" style="padding:0.45rem 0.65rem;font-size:var(--ds-text-sm);" onchange="changeTerminal(this.value)">



                        <option value="1st" {% if selected_terminal == '1st' %}selected{% endif %}>1st Terminal</option>



                        <option value="2nd" {% if selected_terminal == '2nd' %}selected{% endif %}>2nd Terminal</option>



                        <option value="3rd" {% if selected_terminal == '3rd' %}selected{% endif %}>3rd Terminal</option>



                        <option value="Final" {% if selected_terminal == 'Final' %}selected{% endif %}>Final</option>



                    </select>



                </div>



                <button type="button" class="btn ds ds-ghost" onclick="window.print()">



                    <i class="fas fa-print"></i> Print



                </button>



                {% endif %}



            </div>



        </div>







        {% if selected_student and student_results %}



        <div class="student-chip visible fade-in no-print" style="margin-bottom:1rem;">



            <i class="fas fa-user-graduate"></i>



            <span>{{ selected_student.name }} · Class {{ selected_student.student_class }}-{{ selected_student.section }} · {{ selected_terminal }} Terminal</span>



        </div>







        <article class="marksheet-doc fade-in ocr-readable" id="marksheetDocument">



            <header class="marksheet-doc-header">



                <span class="marksheet-terminal-badge">{{ selected_terminal }} Terminal</span>



                <div class="college-brand">



                    <h1>Soch College of IT</h1>



                    <p class="college-meta">



                        Ranipauwa, Pokhara · TU Affiliated<br>



                        sochcollege.edu.np · +977-61574096 / 543120 · info@sochcollege.edu.np



                    </p>



                </div>



                <div class="marksheet-qr">



                    <div class="marksheet-qr-box" id="marksheetQrBox">



                        {% if college_qr_code %}



                        <img src="data:image/png;base64,{{ college_qr_code }}" alt="Verification QR code" id="marksheetQrFallback">



                        {% endif %}



                        <canvas id="marksheetQrCanvas" aria-label="Verification QR code"{% if college_qr_code %} hidden{% endif %}></canvas>



                    </div>



                    <p class="marksheet-qr-caption no-print">Scan to verify</p>



                </div>



            </header>







            <section class="marksheet-section marksheet-section--student">



                <h2 class="marksheet-section-title"><i class="fas fa-user"></i> Student Information</h2>



                <dl class="marksheet-details">



                    <div class="marksheet-detail-row">



                        <dt>Name</dt>



                        <dd>{{ selected_student.name }}</dd>



                    </div>



                    <div class="marksheet-detail-row">



                        <dt>Roll No.</dt>



                        <dd>{{ selected_student.roll_number|default:"N/A" }}</dd>



                    </div>



                    <div class="marksheet-detail-row">



                        <dt>Class</dt>



                        <dd>{{ selected_student.student_class }}</dd>



                    </div>



                    <div class="marksheet-detail-row">



                        <dt>Section</dt>



                        <dd>{{ selected_student.section }}</dd>



                    </div>



                    <div class="marksheet-detail-row">



                        <dt>Academic Year</dt>



                        <dd>{{ academic_year }}</dd>



                    </div>



                    <div class="marksheet-detail-row">



                        <dt>Terminal</dt>



                        <dd>{{ selected_terminal }}</dd>



                    </div>



                </dl>



            </section>







            <section class="marksheet-section marksheet-section--performance">



                <h2 class="marksheet-section-title"><i class="fas fa-table"></i> Academic Performance</h2>



                <div class="table-wrap">



                    <table class="marksheet-table">



                        <thead>



                            <tr>



                                <th class="col-sn">S.N.</th>



                                <th class="col-code">Code</th>



                                <th class="col-subject">Subject</th>



                                <th class="num col-obt">Obtained</th>



                                <th class="num col-tot">Total</th>



                                <th class="num col-pct">%</th>



                                <th class="num col-grade">Grade</th>



                            </tr>



                        </thead>



                        <tbody>



                            {% for item in student_results %}



                            <tr>



                                <td>{{ forloop.counter }}</td>



                                <td><strong>{{ item.result.subject.code }}</strong></td>



                                <td>{{ item.result.subject.name }}</td>



                                <td class="num">{{ item.result.marks_obtained|floatformat:1 }}</td>



                                <td class="num">{{ item.result.total_marks|floatformat:1 }}</td>



                                <td class="num">{{ item.percentage|floatformat:1 }}%</td>



                                <td class="num">



                                    <span class="marksheet-grade {% if item.grade == 'F' %}fail{% else %}pass{% endif %}">{{ item.grade }}</span>



                                </td>



                            </tr>



                            {% endfor %}



                        </tbody>



                        <tfoot>



                            <tr class="marksheet-tfoot-total">



                                <td colspan="3"><strong>Total Percentage/GPA</strong></td>



                                <td class="num"><strong>{{ total_marks_obtained|floatformat:1 }}</strong></td>



                                <td class="num"><strong>{{ total_marks|floatformat:1 }}</strong></td>



                                <td class="num"><strong>{{ overall_percentage|floatformat:1 }}%</strong></td>



                                <td class="num marksheet-tfoot-gpa-val"><strong>{% if all_passed %}{{ gpa|floatformat:2 }}{% else %}—{% endif %}</strong></td>



                            </tr>



                        </tfoot>



                    </table>



                </div>



            </section>







            <section class="marksheet-section marksheet-section--summary">



                <h2 class="marksheet-section-title"><i class="fas fa-chart-pie"></i> Summary</h2>



                <div class="marksheet-summary marksheet-summary--compact">



                    <div class="marksheet-summary-item">



                        <span class="lbl">Subjects</span>



                        <span class="val">{{ total_subjects }}</span>



                    </div>



                    <div class="marksheet-summary-item">



                        <span class="lbl">Total Marks</span>



                        <span class="val">{{ total_marks_obtained|floatformat:1 }}/{{ total_marks|floatformat:1 }}</span>



                    </div>



                    <div class="marksheet-summary-item">



                        <span class="lbl">Overall %</span>



                        <span class="val {% if overall_percentage >= 40 %}pass{% else %}fail{% endif %}">{{ overall_percentage|floatformat:1 }}%</span>



                    </div>



                    <div class="marksheet-summary-item">



                        <span class="lbl">GPA</span>



                        <span class="val">{% if all_passed %}{{ gpa|floatformat:2 }}{% else %}—{% endif %}</span>



                    </div>



                    <div class="marksheet-summary-item">



                        <span class="lbl">Result</span>



                        <span class="val {% if all_passed %}pass{% else %}fail{% endif %}">{% if all_passed %}PASS{% else %}FAIL{% endif %}</span>



                    </div>



                </div>



            </section>







            <footer class="marksheet-section marksheet-section--footer">



                <div class="marksheet-signatures">



                    <div class="marksheet-sig-line">Class Teacher</div>



                    <div class="marksheet-sig-line">Principal</div>



                    <div class="marksheet-sig-line">Controller of Examination</div>



                </div>



                <div class="marksheet-footer-meta">



                    <span>ID: {{ doc_id }}</span>



                    <span>Generated: {% now "d M Y" %}</span>



                    <span>Page 1 of 1</span>



                </div>



            </footer>



        </article>







        {% elif selected_student %}



        <section class="section-card fade-in">



            <div class="empty-state" style="padding:2.5rem 1rem;">



                <i class="fas fa-file-alt"></i>



                <p style="font-weight:600;color:var(--text-primary);margin:0.5rem 0 0.25rem;">No marks for {{ selected_terminal }} Terminal</p>



                <p class="text-muted" style="margin:0 0 1rem;">Add marks from View All Marks, then regenerate this sheet.</p>



                <div class="actions-bar" style="justify-content:center;border-top:none;padding-top:0;">



                    <a href="/add-marks/" class="btn ds ds-primary"><i class="fas fa-plus"></i> Add Marks</a>



                    <a href="/select-mark-sheet/" class="btn ds ds-ghost"><i class="fas fa-redo"></i> Change Selection</a>



                </div>



            </div>



        </section>



        {% else %}



        <section class="section-card fade-in">



            <div class="empty-state" style="padding:2.5rem 1rem;">



                <i class="fas fa-file-alt"></i>



                <p style="font-weight:600;color:var(--text-primary);">Select a student to generate a marksheet</p>



                <a href="/select-mark-sheet/" class="btn ds ds-primary" style="margin-top:1rem;"><i class="fas fa-arrow-right"></i> Go to Selection</a>



            </div>



        </section>



        {% endif %}



    </main>







    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>



    <script>



    function changeTerminal(terminal) {



        var parts = window.location.pathname.split('/').filter(Boolean);



        var idx = parts.indexOf('mark-sheet');



        if (idx !== -1 && parts[idx + 1]) {



            window.location.href = '/mark-sheet/' + parts[idx + 1] + '/' + terminal + '/';



        } else {



            window.location.href = '/select-mark-sheet/';



        }



    }







    (function() {



        var verifyUrl = "{{ verify_url|escapejs }}";



        var canvas = document.getElementById('marksheetQrCanvas');



        var fallback = document.getElementById('marksheetQrFallback');



        if (!canvas || typeof QRCode === 'undefined') return;



        QRCode.toCanvas(canvas, verifyUrl, {



            width: 88,



            margin: 1,



            color: { dark: '#0a0a0a', light: '#ffffff' }



        }, function(err) {



            if (!err) {



                canvas.width = 88;



                canvas.height = 88;



                canvas.hidden = false;



                if (fallback) fallback.hidden = true;



            }



        });



    })();



    </script>
