{% load static %}
{% include 'core/partials/app_campus_bg.html' %}
<nav class="navbar app-nav-style liquid-glass-nav" id="appNav" data-lg-radius="0">
    <div class="lg-nav-inner">
        <div class="lg-nav-glow" aria-hidden="true"></div>
<h2 class="logo" style="margin:0;display:flex;align-items:center;justify-content:center;flex:0 0 auto;">
        <a href="/dashboard/" style="display:flex;align-items:center;gap:0.5rem;text-decoration:none;color:inherit;">
            <img
                src="{% static 'images/acadstat-brand-white.png' %}"
                data-logo-light="{% static 'images/acadstat-brand.png' %}"
                data-logo-dark="{% static 'images/acadstat-brand-white.png' %}"
                alt="AcadStat"
                class="logo-adaptive brand-logo-img"
                style="height:30px;display:block;"
            >
            <span style="font-weight:800;letter-spacing:0.06em;text-transform:uppercase;font-size:0.85rem;">AcadStat</span>
        </a>
    </h2>
    <div class="nav-links">
        {% if nav_links %}
            {{ nav_links|safe }}
        {% else %}
            <a href="/dashboard/"><i class="fas fa-th-large"></i> Dashboard</a>
        {% endif %}
        {% if user.is_authenticated %}
            <a href="/logout/"><i class="fas fa-sign-out-alt"></i> Logout</a>
        {% else %}
            <a href="/login/"><i class="fas fa-sign-in-alt"></i> Login</a>
        {% endif %}
        <button class="theme-toggle ds-toggle" id="themeToggle" type="button" aria-label="Toggle theme">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
    </div>
    </div>
</nav>
