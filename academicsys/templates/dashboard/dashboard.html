
{% extends 'base/base.html' %}
{% block content %}

<h3>Marks Analytics Dashboard</h3>

<canvas id="marksChart"></canvas>

<script>
const labels = {{ labels|safe }};
const data = {{ data|safe }};

new Chart(document.getElementById('marksChart'), {
type: 'bar',
data: {
labels: labels,
datasets: [{
label: 'Marks',
data: data
}]
}
});
</script>

{% endblock %}
